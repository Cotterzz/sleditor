<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleditor has moved to Sledit.xyz</title>
    <style>
        :root {
            --bg: #f5f5f5;
            --surface: #ffffff;
            --text: #1a1a1a;
            --muted: #555555;
            --accent: #2a5caa;
            --border: #e0e0e0;
            --callout-bg: #eef3fb;
            --pro-bg: #f0f4ff;
            --pro-border: #2a5caa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.75;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            background: var(--surface);
            padding: 3rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        header {
            border-bottom: 2px solid var(--border);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }

        .site-link {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--accent);
            text-decoration: none;
        }

        .site-link:hover { text-decoration: underline; }

        h1 {
            font-size: 2rem;
            margin: 0.4rem 0 0.25rem;
        }

        .meta { color: var(--muted); font-size: 0.9rem; }

        h2 {
            font-size: 1.25rem;
            margin: 2.5rem 0 0.75rem;
            padding-bottom: 0.35rem;
            border-bottom: 1px solid var(--border);
        }

        p { margin-bottom: 0.9rem; }

        a { color: var(--accent); }
        a:hover { text-decoration: underline; }

        .tiers {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .tier {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
        }

        .tier-pro {
            background: var(--pro-bg);
            border-color: var(--pro-border);
            border-width: 2px;
        }

        .tier h3 {
            font-size: 1.2rem;
            margin-bottom: 0.25rem;
        }

        .tier .price {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .tier .price span {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--muted);
        }

        .tier ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .tier li {
            padding: 0.3rem 0 0.3rem 1.6rem;
            position: relative;
            font-size: 0.95rem;
        }

        .tier li::before {
            content: "✓";
            position: absolute;
            left: 0;
            font-weight: bold;
            color: #3a8a3a;
        }

        .callout {
            background: var(--callout-bg);
            border-left: 4px solid var(--accent);
            padding: 1rem 1.25rem;
            margin: 1rem 0 1.25rem;
            border-radius: 0 4px 4px 0;
        }

        .callout p:last-child { margin-bottom: 0; }

        footer {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.875rem;
            color: var(--muted);
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        @media (max-width: 640px) {
            .container { padding: 1.5rem; }
            h1 { font-size: 1.6rem; }
            .tiers { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">

    <header>
        <h1>Sleditor V1 is retired</h1>
    </header>

    <section>
        <h2>Please use V2:</h2>

        <p>
            <a href="https://sledit.xyz/">Sledit.xyz</a>
        </p>
    </section>

</div>
</body>
</html>
